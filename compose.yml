services:
  web:
    build: .
    container_name: spring2026-web
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - .:/var/www/html
      - ./certs:/etc/apache2/ssl
      - php_sessions:/tmp
    depends_on:
      mysql:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    networks:
      - web

  udf-builder:
    build:
      context: ./sql/c
      dockerfile: Dockerfile
    container_name: spring2026-udf-builder
    volumes:
      - mysql_plugins:/mysql-plugins
    restart: "no"

  mysql:
    image: mysql:8.0
    container_name: spring2026-mysql
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: med_helth
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_plugins:/usr/lib64/mysql/plugin
    command: --default-authentication-plugin=mysql_native_password --log-bin-trust-function-creators=1 --event-scheduler=ON
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

  load-udf:
    image: mysql:8.0
    container_name: spring2026-load-udf
    depends_on:
      mysql:
        condition: service_healthy
      udf-builder:
        condition: service_completed_successfully
    environment:
      MYSQL_PWD: root
    command: >
      mysql -h mysql -u root med_helth
      -e "CREATE FUNCTION IF NOT EXISTS addr_to_point   RETURNS STRING  SONAME 'addr_to_point.so';
          CREATE FUNCTION IF NOT EXISTS is_valid_address RETURNS INTEGER SONAME 'addr_to_point.so';
          CREATE FUNCTION IF NOT EXISTS nearest_addr    RETURNS STRING  SONAME 'addr_to_point.so';
          CREATE FUNCTION IF NOT EXISTS nearest_point   RETURNS STRING  SONAME 'addr_to_point.so';
          CREATE FUNCTION IF NOT EXISTS address_parts   RETURNS STRING  SONAME 'addr_to_point.so';
          CREATE FUNCTION IF NOT EXISTS address_zip     RETURNS STRING  SONAME 'addr_to_point.so';"
    restart: "no"
    networks:
      - web

  migrate:
    image: mysql:8.0
    container_name: spring2026-migrate
    depends_on:
      mysql:
        condition: service_healthy
      load-udf:
        condition: service_completed_successfully
      grant-permissions:
        condition: service_completed_successfully
    environment:
      MYSQL_PWD: root
    volumes:
      - ./sql:/sql:ro
    command: >
      bash -c "
        mysql -h mysql -u root med_helth < /sql/database.sql &&
        mysql -h mysql -u root med_helth < /sql/table.sql &&
        mysql -h mysql -u root med_helth < /sql/function.sql &&
        mysql -h mysql -u root med_helth < /sql/procedure.sql &&
        mysql -h mysql -u root med_helth < /sql/trigger.sql &&
        mysql -h mysql -u root med_helth < /sql/view.sql &&
        mysql -h mysql -u root med_helth < /sql/event.sql &&
        mysql -h mysql -u root med_helth < /sql/data/institution.sql &&
        mysql -h mysql -u root med_helth < /sql/data/allergy.sql &&
        mysql -h mysql -u root med_helth < /sql/data/medicine.sql &&
        mysql -h mysql -u root med_helth < /sql/data/interactions.sql &&
        mysql -h mysql -u root med_helth < /sql/data/vaccine.sql &&
        mysql -h mysql -u root med_helth < /sql/data/visit.sql
      "
    restart: "no"
    networks:
      - web

  grant-permissions:
    image: mysql:8.0
    container_name: spring2026-grant-permissions
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PWD: root
    command: >
      mysql -h mysql -u root
      -e "GRANT ALL PRIVILEGES ON med_helth.* TO 'app'@'%'; FLUSH PRIVILEGES;"
    restart: "no"
    networks:
      - web

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: spring2026-phpmyadmin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: app
      PMA_PASSWORD: app
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
      PMA_ABSOLUTE_URI: http://spring2026.local:8081/
    ports:
      - "8081:80"
    networks:
      - web

  mailpit:
    image: axllent/mailpit:latest
    container_name: spring2026-mailpit
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/livez"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web

volumes:
  mysql_data:
  mysql_plugins:
  php_sessions:

networks:
  web:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: spring2026
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
    external: false
