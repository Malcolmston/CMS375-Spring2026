apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring2026-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring2026-mysql
  template:
    metadata:
      labels:
        app: spring2026-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "app"
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: spring2026-config
                  key: DB_NAME
            - name: MYSQL_USER
              value: "app"
            - name: MYSQL_PASSWORD
              value: "app"
          args:
            - "--default-authentication-plugin=mysql_native_password"
            - "--log-bin-trust-function-creators=1"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: spring2026-mysql
spec:
  selector:
    app: spring2026-mysql
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
  clusterIP: None