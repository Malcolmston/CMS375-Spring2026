apiVersion: v1
kind: Service
metadata:
  name: spring2026-lb
  namespace: default
spec:
  allocateLoadBalancerNodePorts: true
  clusterIP: 10.96.67.161
  clusterIPs:
  - 10.96.67.161
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    nodePort: 32667
    port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: spring2026-php
  sessionAffinity: None
  type: LoadBalancer
status:
  loadBalancer: {}
