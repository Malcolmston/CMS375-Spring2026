# Kubernetes Secrets - injected from HashiCorp Cloud Vault
apiVersion: v1
kind: Secret
metadata:
  name: spring2026-secrets
type: Opaque
stringData:
  DB_HOST: ""
  DB_USER: ""
  DB_PASS: ""
  NEWS_API_KEY: ""
---
# Production deployment with HashiCorp Cloud Vault
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring2026-php
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring2026-php
  template:
    metadata:
      labels:
        app: spring2026-php
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/addr: "https://vault-cluster-public-vault-6aa09560.21f7c538.z1.hashicorp.cloud:8200"
        vault.hashicorp.com/namespace: "admin"
        vault.hashicorp.com/token-file: "/vault/token"
        vault.hashicorp.com/role: "spring2026"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/spring2026"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/spring2026" -}}
          {{- range $k, $v := .data.data }}
          export {{ $k | upper }}='{{ $v }}'
          {{- end }}
          {{- end }}
    spec:
      containers:
        - name: php
          image: malcolmston/spring2026-php:latest
          volumeMounts:
            - name: vault-token
              mountPath: /vault
              readOnly: true
      volumes:
        - name: vault-token
          secret:
            secretName: vault-token